
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
:root{
  --accent:#7A2D46;--accent-light:#f3e8ec;--accent-mid:#c8909f;
  --navy:#0f2744;--navy-mid:#1a3a5c;--navy-light:#e8eef6;
  --surface:#ffffff;--surface-1:#f4f7fb;--surface-2:#ffffff;
  --border:#dde4ef;--border-strong:#b8c5d8;
  --text:#0f2744;--text-2:#4a6080;--text-3:#8aa0b8;
  --success:#0e7c5a;--success-bg:#e6f5f0;
  --warn:#b45309;--warn-bg:#fff7ed;
  --danger:#be123c;--danger-bg:#fff1f2;
  --pro:#5b21b6;--pro-bg:#f5f0ff;
  --radius:10px;--shadow:0 2px 12px rgba(15,39,68,.08);--shadow-md:0 4px 20px rgba(15,39,68,.12);
  /* Aliases used by original JS */
  --fill-accent:var(--accent);--bg-accent:var(--accent-light);--border-accent:var(--accent-mid);--text-accent:var(--accent);--on-accent:#fff;
  --fill-success:#0e7c5a;--bg-success:#e6f5f0;--text-success:#0e7c5a;
  --fill-warning:#b45309;--bg-warning:#fff7ed;--text-warning:#b45309;
  --fill-danger:#be123c;--bg-danger:#fff1f2;--border-danger:#fda4af;--text-danger:#be123c;
  --fill-pro:#5b21b6;--bg-pro:#f5f0ff;--border-pro:#c4b5fd;--text-pro:#5b21b6;
  --fill-meta:#0e7c5a;--bg-meta:#e6f5f0;--text-meta:#0e7c5a;
  --surface-0:var(--surface-1);--border-stronger:var(--border-strong);
  --font-sans:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--surface-1);color:var(--text)}
.app{max-width:100%;padding:0}

/* Header */
.header{display:flex;align-items:center;gap:12px;padding:11px 18px;background:var(--navy);border-bottom:none;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,39,68,.18)}
.header-title{font-size:15px;font-weight:600;flex:1;color:#fff;letter-spacing:.01em}
#clock{color:rgba(255,255,255,.55)!important;font-size:12px}

/* Patient strip */
.patient-strip{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;background:var(--navy-mid);border-bottom:none}
.pat-btn{min-width:44px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.7);flex-shrink:0}
.pat-btn.active{background:#fff;border-color:#fff;color:var(--navy)}
.pat-btn.alert{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;padding:0 8px}
.tab{padding:10px 14px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-2);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Content */
.content{padding:14px 16px;overflow-y:auto;max-height:calc(100vh - 180px);background:var(--surface-1)}
.section{margin-bottom:16px}
.section-title{font-size:10.5px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* Fields */
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;color:var(--text-2);font-weight:500}
.field input,.field select,.field textarea{font-size:13px;padding:7px 9px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);width:100%;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent-mid)}
.field textarea{resize:vertical;min-height:60px}

/* Cards */
.round-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
.round-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.round-label{font-size:12px;font-weight:600;color:var(--text-2)}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500}
.badge-ok{background:var(--success-bg);color:var(--success)}
.badge-warn{background:var(--warn-bg);color:var(--warn)}

/* Events */
.event-card{border-radius:10px;padding:9px 11px;margin-bottom:7px;border-left:3px solid;box-shadow:var(--shadow)}
.event-neuro{background:var(--pro-bg);border-color:var(--pro)}
.event-resp{background:var(--accent-light);border-color:var(--accent)}
.event-hemody{background:var(--danger-bg);border-color:var(--danger)}
.event-gen{background:var(--warn-bg);border-color:var(--fill-warning)}
.event-meta{background:var(--success-bg);border-color:var(--success)}
.event-sept{background:var(--surface-1);border-color:var(--border-strong)}
.event-tag{font-size:11px;font-weight:600;margin-bottom:3px;color:var(--text-2)}
.event-text{font-size:13px;color:var(--text)}

/* Buttons */
.btn-add{display:flex;align-items:center;gap:6px;font-size:13px;padding:7px 12px;border-radius:8px;border:1px dashed var(--accent-mid);background:var(--accent-light);color:var(--accent);cursor:pointer;width:100%;justify-content:center;margin-top:6px;font-weight:500;transition:all .15s}
.btn-add:hover{background:var(--accent);color:#fff;border-style:solid}
.btn-primary{padding:7px 16px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:13px;cursor:pointer;font-weight:500}
.btn-cancel{padding:7px 16px;border-radius:8px;background:transparent;color:var(--text-2);border:1px solid var(--border);font-size:13px;cursor:pointer}
.btn-del{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.btn-del:hover{border-color:var(--danger);color:var(--danger)}

/* Rows */
.ivse-row{display:grid;grid-template-columns:1fr 80px 70px 28px;gap:6px;align-items:center;margin-bottom:6px}
.ivse-row input{font-size:12px}
.bilan-row{display:flex;gap:8px;margin-bottom:6px}
.bilan-row input{flex:1;font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.consigne-row{display:flex;gap:8px;margin-bottom:6px}
.consigne-row input{flex:1;font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.check-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.check-row:last-child{border-bottom:none}
.check-row label{font-size:13px;flex:1;cursor:pointer}
.check-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}

/* Misc */
.notes-area{width:100%;min-height:120px;font-size:14px;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);resize:vertical;line-height:1.6}
.rass-select{font-size:13px}
.vent-toggle{display:flex;gap:0;margin-bottom:10px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.vent-btn{flex:1;padding:7px;border:none;border-right:1px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text-2);transition:all .15s}
.vent-btn:last-child{border-right:none}
.vent-btn.active{background:var(--navy);color:#fff}
.pupil-row{display:flex;gap:16px}
.pupil-col{flex:1}
.pupil-col label{font-size:11px;color:var(--text-2);display:block;margin-bottom:3px}
.sep{height:1px;background:var(--border);margin:12px 0}
.tag-select{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tag-opt{padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid var(--border);cursor:pointer;color:var(--text-2);background:var(--surface);transition:all .15s}
.tag-opt.sel-neuro{background:var(--pro-bg);border-color:var(--pro);color:var(--pro)}
.tag-opt.sel-resp{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.tag-opt.sel-hemody{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}
.tag-opt.sel-gen{background:var(--warn-bg);border-color:var(--fill-warning);color:var(--warn)}
.tag-opt.sel-meta{background:var(--success-bg);border-color:var(--success);color:var(--success)}
.tag-opt.sel-sept{background:var(--surface-1);border-color:var(--border-strong);color:var(--text)}
.infect-row{background:var(--danger-bg);border:1px solid var(--border);border-left:3px solid var(--danger);border-radius:10px;padding:10px 12px;margin-bottom:8px;box-shadow:var(--shadow)}
.infect-label{font-size:11px;font-weight:600;color:var(--danger);margin-bottom:6px}
.priority-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;cursor:pointer;white-space:nowrap}
.p-high{background:var(--danger-bg);color:var(--danger)}
.p-med{background:var(--warn-bg);color:var(--warn)}
.p-low{background:var(--success-bg);color:var(--success)}
.modal-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(15,39,68,.45);display:flex;align-items:center;justify-content:center;z-index:200;border-radius:12px}
.modal{background:var(--surface);border-radius:14px;padding:18px;width:90%;max-width:400px;border:1px solid var(--border);box-shadow:var(--shadow-md)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--navy)}
.modal-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px 10px;box-shadow:var(--shadow)}
.sum-val{font-size:18px;font-weight:600;color:var(--text)}
.sum-lbl{font-size:11px;color:var(--text-3)}
/* Examens complémentaires fond jaune pastel */
.examen-block{background:#fefce8;border:1px solid #fde047;border-radius:12px;padding:12px 14px;margin-top:10px}
.examen-block .examen-sub{font-size:11px;font-weight:600;color:#854d0e;text-transform:uppercase;letter-spacing:.06em;margin:8px 0 5px}
.examen-block .examen-sub:first-child{margin-top:0}
.examen-row-grid{display:grid;grid-template-columns:1fr 90px 95px 26px;gap:5px;margin-bottom:5px;align-items:center}
.examen-row-grid input{font-size:12px;padding:5px 7px;border-radius:7px;border:1px solid #fde047;background:#fff;color:var(--text);width:100%}
.btn-add-yellow{display:flex;align-items:center;gap:6px;font-size:12px;padding:6px 10px;border-radius:8px;border:1px dashed #ca8a04;background:#fef9c3;color:#854d0e;cursor:pointer;width:100%;justify-content:center;margin-top:4px;font-weight:500;transition:all .15s}
.btn-add-yellow:hover{background:#ca8a04;color:#fff;border-style:solid}
</style>

<div class="app" style="position:relative;min-height:400px" id="app">
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden">Application de garde en réanimation — suivi des 11 patients</h2>

<div class="header">
  <span style="font-size:20px" aria-hidden="true">🦄</span>
  <span class="header-title">Réa St-Joseph</span>
  <span id="clock" style="font-size:12px;color:var(--text-muted)"></span>
</div>

<div class="patient-strip" id="patStrip"></div>

<div class="tabs" id="tabBar">
  <div class="tab active" onclick="switchTab(0)"><i class="ti ti-clipboard-list" aria-hidden="true"></i> Bilan initial</div>
  <div class="tab" onclick="switchTab(1)"><i class="ti ti-clock" aria-hidden="true"></i> Tournées</div>
  <div class="tab" onclick="switchTab(2)"><i class="ti ti-notes" aria-hidden="true"></i> Consignes</div>
  <div class="tab" onclick="switchTab(3)"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Événements</div>
  <div class="tab" onclick="switchTab(4)"><i class="ti ti-writing" aria-hidden="true"></i> Notes</div>
  <div class="tab" onclick="switchTab(5)" style="border-left:1px solid var(--border)"><i class="ti ti-list-check" aria-hidden="true"></i> Toutes consignes</div>
</div>

<div class="content" id="mainContent"></div>
</div>

<script>
const N_PAT = 11;
let curPat = 0;
let curTab = 0;

const defaultPat = () => ({
  nom: '', age: '', motif: '', poids: '',
  antecedents: '', histoire: '',
  examCompl: {bio:[{intitule:'',date:'',resultat:''}],imagerie:[{intitule:'',date:'',conclusion:''}]},
  // Étape 1
  vitaux: {fc:'',pas:'',pad:'',temp:'',diurese:'',glycemie:'',rass:'0',
    drains:[{desc:'',quantite:'',aspect:''}],
    pupG_taille:'',pupD_taille:'',reactG:false,reactD:false,egales:true},
  vent: {mode:'VAC',fr:'',vt:'',peep:'',fio2:'',ai:'',vsai_fr:'',vsai_vt:'',spo2:''},
  balance: {
    entrees_perf:'',entrees_enterale:'',entrees_autres:'',
    sorties_diurese:'',sorties_drain:'',sorties_autres:''
  },
  bilan: {date:'',results:[{nom:'',val:''}]},
  infectieux: [{type:'',date:'',germen:'',atb:'',dateAtb:''}],
  ivse: [{nom:'',dose:'',vitesse:''}],
  perf: [{nom:'',vol:'',debit:''}],
  checklist: {ration:false,enterale:false,parenterale:false,sng:false,gastroprot:false,thrombopro:false,atb:false,antiepilep:false,autres:''},
  // Étape 2
  tournees: [{h:'H0',fc:'',diurese:'',temp:'',glycemie:'',auscult:'',position:''}],
  consignes: [],
  // Étape 4 — events per patient
  events: [],
  alertFlag: false,
  notes: ''
});

let pats = Array.from({length:N_PAT}, defaultPat);
let globalConsignes = [];
let globalNotes = '';

function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,1000);
updateClock();

function buildPatStrip(){
  const el=document.getElementById('patStrip');
  el.innerHTML=pats.map((p,i)=>`<button class="pat-btn${i===curPat?' active':''}${p.alertFlag?' alert':''}" onclick="selPat(${i})">P${i+1}${p.nom?'<br><span style="font-size:10px">'+p.nom.substring(0,5)+'</span>':''}</button>`).join('');
}

function selPat(i){curPat=i;buildPatStrip();render();}

function switchTab(i){
  curTab=i;
  document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  render();
}

function f(path,val){
  const p=pats[curPat];
  const keys=path.split('.');
  let obj=p;
  for(let i=0;i<keys.length-1;i++) obj=obj[keys[i]];
  if(val===undefined) return obj[keys[keys.length-1]];
  obj[keys[keys.length-1]]=val;
  return val;
}

function inp(path,label,type='text',placeholder=''){
  const v=f(path)||'';
  return `<div class="field"><label>${label}</label><input type="${type}" value="${v.toString().replace(/"/g,'&quot;')}" placeholder="${placeholder}" oninput="f('${path}',this.value)"></div>`;
}

function chk(path,label){
  const v=f(path)||false;
  return `<div class="check-row"><input type="checkbox" id="chk_${path}" ${v?'checked':''} onchange="f('${path}',this.checked)"><label for="chk_${path}">${label}</label></div>`;
}

function renderTab0(){
  const p=pats[curPat];
  const v=p.vitaux, ve=p.vent;
  return `
<div class="round-card" style="border-left:3px solid var(--accent);background:var(--accent-light)">
  <div class="section-title" style="color:var(--accent);margin-bottom:10px">📁 Dossier permanent</div>
  <div class="grid-3" style="margin-bottom:8px">
    ${inp('nom','Nom / initiales','text','ex: Dupont J.')}
    ${inp('age','Âge','number','années')}
    ${inp('motif','Motif d\'admission','text','ex: SDRA')}
  </div>
  <div class="field" style="margin-bottom:8px">
    <label>Antécédents</label>
    <textarea oninput="f('antecedents',this.value)">${p.antecedents||''}</textarea>
  </div>
  <div class="field" style="margin-bottom:10px">
    <label>Histoire de la maladie</label>
    <textarea oninput="f('histoire',this.value)">${p.histoire||''}</textarea>
  </div>
  <div class="examen-block">
    <div class="section-title" style="color:#92400e">Examens complémentaires</div>
    <div class="examen-sub">Biologie</div>
    <div style="display:grid;grid-template-columns:1fr 90px 95px 26px;gap:5px;margin-bottom:4px">
      <span style="font-size:10px;color:#92400e;font-weight:500">Examen</span>
      <span style="font-size:10px;color:#92400e;font-weight:500">Résultat</span>
      <span style="font-size:10px;color:#92400e;font-weight:500">Date</span><span></span>
    </div>
    ${p.examCompl.bio.map((b,i)=>`<div class="examen-row-grid">
      <input placeholder="ex: NFS, CRP, lactates…" value="${b.intitule||''}" oninput="pats[${curPat}].examCompl.bio[${i}].intitule=this.value">
      <input placeholder="valeur" value="${b.resultat||''}" oninput="pats[${curPat}].examCompl.bio[${i}].resultat=this.value">
      <input type="date" value="${b.date||''}" oninput="pats[${curPat}].examCompl.bio[${i}].date=this.value">
      <button class="btn-del" onclick="pats[${curPat}].examCompl.bio.splice(${i},1);render()"><i class="ti ti-x"></i></button>
    </div>`).join('')}
    <button class="btn-add-yellow" onclick="pats[${curPat}].examCompl.bio.push({intitule:'',date:'',resultat:''});render()"><i class="ti ti-plus"></i> Ajouter bilan biologique</button>
    <div class="examen-sub">Imagerie</div>
    <div style="display:grid;grid-template-columns:1fr 90px 95px 26px;gap:5px;margin-bottom:4px">
      <span style="font-size:10px;color:#92400e;font-weight:500">Examen</span>
      <span style="font-size:10px;color:#92400e;font-weight:500">Conclusion</span>
      <span style="font-size:10px;color:#92400e;font-weight:500">Date</span><span></span>
    </div>
    ${p.examCompl.imagerie.map((im,i)=>`<div class="examen-row-grid">
      <input placeholder="ex: Radio thorax, TDM…" value="${im.intitule||''}" oninput="pats[${curPat}].examCompl.imagerie[${i}].intitule=this.value">
      <input placeholder="conclusion" value="${im.conclusion||''}" oninput="pats[${curPat}].examCompl.imagerie[${i}].conclusion=this.value">
      <input type="date" value="${im.date||''}" oninput="pats[${curPat}].examCompl.imagerie[${i}].date=this.value">
      <button class="btn-del" onclick="pats[${curPat}].examCompl.imagerie.splice(${i},1);render()"><i class="ti ti-x"></i></button>
    </div>`).join('')}
    <button class="btn-add-yellow" onclick="pats[${curPat}].examCompl.imagerie.push({intitule:'',date:'',conclusion:''});render()"><i class="ti ti-plus"></i> Ajouter imagerie</button>
  </div>
</div>

<div class="section">
  <div class="section-title">Paramètres vitaux (veille)</div>
  <div class="grid-3">
    ${inp('vitaux.fc','FC (bpm)','number','80')}
    ${inp('vitaux.pas','PAS (mmHg)','number','120')}
    ${inp('vitaux.pad','PAD (mmHg)','number','70')}
    ${inp('vitaux.temp','Température (°C)','number','37.5')}
    ${inp('vitaux.diurese','Diurèse (mL/h)','number','50')}
    ${inp('vitaux.glycemie','Glycémie cap. (g/L)','number','1.2')}
  </div>
  <div class="grid-2" style="margin-top:8px">
    <div class="field"><label>RASS</label>
      <select class="rass-select" onchange="f('vitaux.rass',this.value)">
        ${[-5,-4,-3,-2,-1,0,1,2,3,4].map(r=>`<option value="${r}" ${v.rass==r?'selected':''}>${r} — ${['Non réveillable','Sédation profonde','Sédation modérée','Sédation légère','Somnolence','Éveillé/calme','Agité','Très agité','Combatif','Extrêmement combatif'][r+5]}</option>`).join('')}
      </select>
    </div>
  </div>

  <div style="margin-top:10px">
    <div class="section-title">Drains</div>
    <div style="display:grid;grid-template-columns:1fr 80px 1fr 28px;gap:5px;margin-bottom:4px">
      <span style="font-size:10px;color:var(--text-3);font-weight:500">Description</span>
      <span style="font-size:10px;color:var(--text-3);font-weight:500">Qté (mL)</span>
      <span style="font-size:10px;color:var(--text-3);font-weight:500">Aspect</span>
      <span></span>
    </div>
    ${v.drains.map((d,i)=>`<div style="display:grid;grid-template-columns:1fr 80px 1fr 28px;gap:5px;margin-bottom:5px;align-items:center">
      <input style="font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);width:100%" placeholder="ex: JP, pleurostomie…" value="${d.desc||''}" oninput="pats[${curPat}].vitaux.drains[${i}].desc=this.value">
      <input type="number" style="font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);width:100%" placeholder="50" value="${d.quantite||''}" oninput="pats[${curPat}].vitaux.drains[${i}].quantite=this.value">

<div class="section">

  <div style="margin-bottom:8px;display:flex;align-items:center;gap:10px">
    <div class="field" style="max-width:140px">
      <label>Poids du patient (kg)</label>
      <input type="number" placeholder="70" value="${p.poids||''}" oninput="pats[${curPat}].poids=this.value;render()">
    </div>
    ${p.poids?`<div style="font-size:11px;color:var(--text-2);padding-top:14px">Calcul γ/kg/min disponible</div>`:''}
  </div>
  <div style="display:grid;grid-template-columns:1fr 80px 70px ${p.poids?'90px':''} 28px;gap:6px;margin-bottom:4px">
    <span style="font-size:10px;color:var(--text-3);font-weight:500">Médicament</span>
    <span style="font-size:10px;color:var(--text-3);font-weight:500">Dose/conc.</span>
    <span style="font-size:10px;color:var(--text-3);font-weight:500">Vitesse (mL/h)</span>
    ${p.poids?`<span style="font-size:10px;color:var(--text-3);font-weight:500">γ/kg/min</span>`:''}
    <span></span>
  </div>
  ${p.ivse.map((s,i)=>{
    let gamma='';
    if(p.poids && s.vitesse && s.dose){
      // dose format: "Xmg/50mL" ou "Xmcg/50mL" — on tente d'extraire
      const m=s.dose.match(/([\d.]+)\s*(mg|mcg|µg)[\s\/\\]*(\d+)\s*mL/i);
      if(m){
        const qty=parseFloat(m[1]);
        const unit=m[2].toLowerCase();
        const vol=parseFloat(m[3]);
        const concMcgPerMl=(unit==='mg'?qty*1000:qty)/vol;
        const mcgPerMin=concMcgPerMl*parseFloat(s.vitesse)/60;
        const gkgmin=mcgPerMin/parseFloat(p.poids);
        gamma=gkgmin.toFixed(3);
      }
    }
    return `<div style="display:grid;grid-template-columns:1fr 80px 70px ${p.poids?'90px':''} 28px;gap:6px;align-items:center;margin-bottom:6px">
      <input style="font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text)" value="${s.nom||''}" placeholder="ex: Noradrénaline" oninput="pats[${curPat}].ivse[${i}].nom=this.value">
      <input style="font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text)" value="${s.dose||''}" placeholder="4mg/50mL" oninput="pats[${curPat}].ivse[${i}].dose=this.value;render()">
      <input type="number" style="font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text)" value="${s.vitesse||''}" placeholder="5" oninput="pats[${curPat}].ivse[${i}].vitesse=this.value;render()">
      ${p.poids?`<div style="font-size:12px;padding:5px 8px;border-radius:8px;background:${gamma?'var(--accent-light)':'var(--surface-1)'};border:1px solid var(--border);color:${gamma?'var(--accent)':'var(--text-3)'};text-align:center;font-weight:${gamma?'600':'400'}">${gamma?gamma+' γ':'—'}</div>`:''}
      <button class="btn-del" onclick="pats[${curPat}].ivse.splice(${i},1);render()"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('')}
  <button class="btn-add" onclick="pats[${curPat}].ivse.push({nom:'',dose:'',vitesse:''});render()"><i class="ti ti-plus" aria-hidden="true"></i> Ajouter IVSE</button>
</div>

<div class="section">

  ${p.perf.map((s,i)=>`<div class="ivse-row">
    <input value="${s.nom||''}" placeholder="ex: NaCl 0,9%" oninput="pats[${curPat}].perf[${i}].nom=this.value">
    <input value="${s.vol||''}" placeholder="500mL" oninput="pats[${curPat}].perf[${i}].vol=this.value">
    <input type="number" value="${s.debit||''}" placeholder="mL/h" oninput="pats[${curPat}].perf[${i}].debit=this.value">

function renderTab1(){

  </div>
</div>
<div class="sep"></div>
<div class="section">

  ${allEvts.length===0?`<p style="color:var(--text-muted);font-size:13px">Aucun événement enregistré.</p>`:''}
  ${allEvts.map((e,i)=>{
    const c=CATEG.find(x=>x.k===e.cat)||CATEG[0];
    return `<div class="event-card ${c.evtcls}">
      <div class="event-tag"><span style="opacity:.7">P${e.pat} · ${e.time}</span> — ${c.label}</div>
      <div class="event-text">${e.txt}</div>
    </div>`;
  }).join('')}
</div>`;
}

function addEvent(){
  if(!newEvtTxt.trim()) return;
  const now=new Date();
  pats[curPat].events.push({cat:newEvtCat,txt:newEvtTxt,time:now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})});
  pats[curPat].alertFlag=true;
  newEvtTxt='';
  buildPatStrip();
  render();
}

function renderTab4(){
  return `
<div class="section">
  <div class="section-title">Notes à signaler au staff — P${curPat+1}</div>
  <textarea class="notes-area" oninput="pats[${curPat}].notes=this.value">${pats[curPat].notes||''}</textarea>
</div>
<div class="sep"></div>
<div class="section">
  <div class="section-title">Note générale de garde</div>
  <textarea class="notes-area" style="min-height:100px" oninput="globalNotes=this.value">${globalNotes}</textarea>
</div>`;
}

function render(){
  const renders=[renderTab0,renderTab1,renderTab2,renderTab3,renderTab4,renderTab5];
  document.getElementById('mainContent').innerHTML=renders[curTab]();
}

buildPatStrip();
render();
</script>
